<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .video1 {
            width: 260px;
            height: 150px;
            position: relative;
            border: 1px solid #000;
            background: url(//img.youtube.com/vi/ID-VIDEO/maxresdefault.jpg) 0% 0% / cover;
        }
        
        .video1-play {
            background-image: url(//evilcoder.ru/wp-content/uploads/2018/01/play.png);
            background-repeat: no-repeat;
            background-size: cover;
            height: 60px;
            width: 90px;
            top: 50%;
            left: 50%;
            margin-left: -45px;
            margin-top: -30px;
            position: absolute;
            border-radius: 21px;
            background-position: 50% 50%;
            cursor: pointer;
        }
        
        .video1-play:hover {
            box-shadow: 0 0 12px 0 #000;
        }
    </style>

</head>


<body>




    <script>
        function videoplay(button) {
            let par = button.parentNode;
            let videoId = button.getAttribute('data-video');
            par.innerHTML = '<iframe src="//www.youtube.com/embed/' + videoId + '?autoplay=1" scrolling="no" style="width: 100%; height: 100%;" allow="autoplay"></iframe>';
        }
    </script>

    <div class="video1">
        <div class="video1-play" data-video="ID-ВИДЕО" onclick="videoplay(this);"></div>
    </div>

    <script>
    </script>
</body>

</html>
